  <script>
    function applySidebarIdentityContrast(isDark) {
      const brandTitle = document.getElementById("sidebarBrandTitle");
      const semesterInfo = document.getElementById("sidebarSemesterInfo");
      const roleInfo = document.getElementById("sidebarRoleInfo");
      const brandCopy = document.querySelector(".sidebar-brand-copy");
      const sidebarBrand = document.querySelector(".sidebar-brand");
      const brandMark = document.querySelector(".sidebar-brand-mark");
      const sidebarTop = document.querySelector(".sidebar-top");
      const applyStyle = (element, styles = {}) => {
        if (!element) return;
        Object.entries(styles).forEach(([key, value]) => {
          element.style[key] = value;
        });
      };

      if (isDark) {
        applyStyle(sidebarTop, {
          background: "linear-gradient(180deg, rgba(6, 24, 32, 0.98) 0%, rgba(8, 42, 53, 0.94) 72%, rgba(8, 42, 53, 0))",
          borderBottom: "1px solid rgba(125, 211, 252, 0.18)",
          boxShadow: "0 16px 30px rgba(0, 0, 0, 0.22)"
        });
        applyStyle(sidebarBrand, {
          alignItems: "center",
          padding: "4px 2px",
          border: "0",
          borderRadius: "0",
          background: "transparent",
          boxShadow: "none"
        });
        applyStyle(brandMark, {
          alignSelf: "center",
          padding: "0",
          borderRadius: "0",
          background: "transparent",
          filter: "drop-shadow(0 8px 16px rgba(0, 0, 0, 0.26)) drop-shadow(0 0 10px rgba(45, 212, 191, 0.12))"
        });
        applyStyle(brandCopy, {
          background: "transparent",
          border: "0",
          borderRadius: "0",
          padding: "0",
          boxShadow: "none"
        });
        applyStyle(brandTitle, {
          background: "transparent",
          color: "#ffffff",
          webkitTextFillColor: "#ffffff",
          opacity: "1",
          textShadow: "0 1px 14px rgba(125, 211, 252, 0.32)"
        });
        applyStyle(semesterInfo, {
          background: "rgba(45, 212, 191, 0.18)",
          border: "1px solid rgba(125, 211, 252, 0.42)",
          color: "#e6feff",
          webkitTextFillColor: "#e6feff"
        });
        applyStyle(roleInfo, {
          background: "linear-gradient(135deg, #0f766e, #0e7490)",
          border: "1px solid rgba(153, 246, 228, 0.48)",
          color: "#ffffff",
          webkitTextFillColor: "#ffffff"
        });
        return;
      }

      [sidebarTop, sidebarBrand, brandMark, brandCopy, brandTitle, semesterInfo, roleInfo].forEach(element => {
        if (!element) return;
        element.removeAttribute("style");
      });
    }

    function applyDarkModePreference(isDark) {
      document.documentElement.classList.toggle("dark", isDark);
      if (document.body) document.body.classList.toggle("dark", isDark);
      applySidebarIdentityContrast(isDark);
    }

    function toggleDark() {
      const nextMode = !document.documentElement.classList.contains("dark");
      localStorage.setItem("darkMode", nextMode ? "true" : "false");
      applyDarkModePreference(nextMode);
    }

    if (localStorage.getItem("darkMode") === "true") {
      document.documentElement.classList.add("dark");
    }

    document.addEventListener("DOMContentLoaded", () => {
      applyDarkModePreference(localStorage.getItem("darkMode") === "true");
    });
  </script>

<script>
  if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
  }

  function logout() {
    if (window.DashboardShell?.logout) {
      window.DashboardShell.logout();
      return;
    }
    localStorage.removeItem("login");
    localStorage.removeItem("appUser");
    localStorage.removeItem("appSemester");
    window.location.href = "login.html";
  }

  function getCurrentAppUser() {
    if (window.DashboardShell?.getCurrentAppUser) return window.DashboardShell.getCurrentAppUser();
    if (window.AppUtils?.getStorageJson) return window.AppUtils.getStorageJson("appUser", {}) || {};
    try {
      return JSON.parse(localStorage.getItem("appUser") || "{}");
    } catch {
      return {};
    }
  }

  function getCurrentAppRole() {
    if (window.DashboardShell?.getCurrentAppRole) return window.DashboardShell.getCurrentAppRole();
    return getCurrentAppUser().role || "admin";
  }

  function patchGuruZeroResultAlerts() {
    if (!window.Swal?.fire || window.Swal.__guruZeroResultPatched) return;
    const originalFire = window.Swal.fire.bind(window.Swal);
    window.Swal.fire = function patchedGuruZeroResultFire(...args) {
      const options = typeof args[0] === "object" && args[0] !== null
        ? args[0]
        : { title: args[0], text: args[1], icon: args[2] };
      const text = [
        options.title,
        options.text,
        options.html,
        options.footer
      ].map(value => String(value ?? "")).join(" ").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
      const isGuru = String(getCurrentAppRole() || "").toLowerCase() === "guru";
      const isGuruNilaiPage = isGuru && Boolean(
        document.getElementById("nilaiAssignmentSelect")
        || document.getElementById("nilaiOfflineDraftInfo")
        || document.querySelector(".nilai-page-head")
      );
      if (isGuruNilaiPage) {
        return Promise.resolve({ isDismissed: true, dismiss: "guru-nilai-alerts-disabled" });
      }
      const isNilaiContext = Boolean(
        document.getElementById("nilaiAssignmentSelect")
        || document.getElementById("nilaiOfflineDraftInfo")
        || text.includes("draft")
        || text.includes("nilai")
      );
      const isEmptyResultNotice = /\b0\s*(baris|perubahan|draft|nilai|data|terisi|tersimpan|terkirim|gagal)\b/.test(text)
        || text.includes("tidak ada perubahan")
        || text.includes("tidak ada draft");
      if (isGuru && isNilaiContext && isEmptyResultNotice) {
        return Promise.resolve({ isDismissed: true, dismiss: "guru-zero-result-suppressed" });
      }
      return originalFire(...args);
    };
    window.Swal.__guruZeroResultPatched = true;
  }

  function isGuruSpenturiNativeApp() {
    return Boolean(
      window.Capacitor?.isNativePlatform?.()
      || window.Capacitor?.getPlatform?.() === "android"
      || window.location.protocol === "capacitor:"
    );
  }

  function applyNativeOnlyUi() {
    const isNative = isGuruSpenturiNativeApp();
    document.documentElement.classList.toggle("is-native-app", isNative);
    document.querySelectorAll("[data-native-only]").forEach(element => {
      element.hidden = !isNative;
      element.classList.toggle("native-only-hidden", !isNative);
    });
  }

  window.isGuruSpenturiNativeApp = isGuruSpenturiNativeApp;

  function applyMaintenanceUiState(state = {}) {
    const panel = document.getElementById("backupMaintenancePanel") || document.getElementById("sidebarMaintenancePanel");
    const toggle = document.getElementById("maintenanceModeToggle");
    const statusText = document.getElementById("maintenanceStatusText");
    if (!panel || !toggle || !statusText) return;

    const isAdmin = window.MaintenanceMode?.isAdminRole
      ? window.MaintenanceMode.isAdminRole(getCurrentAppRole())
      : ["admin", "superadmin"].includes(getCurrentAppRole());
    panel.hidden = !isAdmin;
    if (!isAdmin) return;

    toggle.checked = state.enabled === true;
    panel.classList.toggle("is-active", state.enabled === true);
    statusText.textContent = state.enabled ? "Aktif - non-admin ditahan" : "Nonaktif - sistem normal";
  }

  function markRoleAccessReady() {
    document.documentElement.classList.remove("role-access-pending");
  }

  async function enforceDashboardMaintenanceMode() {
    const role = getCurrentAppRole();
    const isAdmin = window.MaintenanceMode?.isAdminRole
      ? window.MaintenanceMode.isAdminRole(role)
      : ["admin", "superadmin"].includes(role);
    if (window.MaintenanceMode.peekCached().enabled && !isAdmin) {
      window.MaintenanceMode.goToMaintenance();
      return true;
    }

    const state = await window.MaintenanceMode.load({ force: true });
    if (state.enabled && !isAdmin) {
      window.MaintenanceMode.goToMaintenance();
      return true;
    }

    applyMaintenanceUiState(state);
    return false;
  }

  async function initializeMaintenanceToggle() {
    if (!window.MaintenanceMode?.isAdminRole?.(getCurrentAppRole())) {
      applyMaintenanceUiState({ enabled: false });
      return;
    }
    const state = await window.MaintenanceMode.load({ force: true });
    applyMaintenanceUiState(state);
  }

  async function handleMaintenanceToggleChange(input) {
    if (!input || !window.MaintenanceMode?.isAdminRole?.(getCurrentAppRole())) return;

    const nextEnabled = Boolean(input.checked);
    input.disabled = true;

    try {
      const current = await window.MaintenanceMode.load({ force: true });

        "success"
      );

      input.checked = !nextEnabled;

    if (window.DashboardShell?.refreshCoordinatorLevels) return window.DashboardShell.refreshCoordinatorLevels();
    if (!["koordinator", "guru"].includes(getCurrentAppRole())) {
      setStoredCoordinatorLevels([]);
      return [];
    }
    const kodeGuru = String(getCurrentAppUser().kode_guru || "").trim();
    if (!kodeGuru) {

    try {
      const documentsApi = window.SupabaseDocuments;
      const snapshot = await documentsApi.collection("informasi_urusan").doc("koordinator_kelas").get();
      const data = snapshot.exists ? snapshot.data() : {};
      const levels = [];
      if (String(data.kelas_7 || "").trim() === kodeGuru) levels.push("7");
      if (String(data.kelas_8 || "").trim() === kodeGuru) levels.push("8");
      if (String(data.kelas_9 || "").trim() === kodeGuru) levels.push("9");
      return setStoredCoordinatorLevels(levels);
    } catch {
      return setStoredCoordinatorLevels([]);
    }

        getUser: getCurrentAppUser,
        getCollectionQuery: getDashboardCollectionQuery

      return result;
    }
    const role = getCurrentAppRole();
    document.querySelectorAll(".role-menu").forEach(menu => {
      menu.style.display = (menu.classList.contains(`role-${role}`) || (role === "superadmin" && menu.classList.contains("role-admin"))) ? "" : "none";

    const waliMenu = document.getElementById("menuWaliKelas");

    document.querySelectorAll("[data-ai-prompt-menu='true']").forEach(button => {
      button.style.display = canAccessAiPromptMenu() ? "" : "none";
    });
    if (!waliMenu) {
      markRoleAccessReady();
      return Promise.resolve();
    }
    if (role === "admin" || role === "superadmin") {
      waliMenu.style.display = "";
      markRoleAccessReady();
      return Promise.resolve();
    }
    if (role === "koordinator") {
      const kodeGuru = String(getCurrentAppUser().kode_guru || "").trim();
      const ownWaliPromise = kodeGuru
        ? getDashboardCollectionQuery("kelas").where("kode_guru", "==", kodeGuru).limit(1).get()
        : Promise.resolve({ empty: true });
      return Promise.all([
        refreshCoordinatorLevels(),
        ownWaliPromise
      ]).then(([levels, waliSnapshot]) => {
        waliMenu.style.display = levels.length || !waliSnapshot.empty ? "" : "none";
      }).catch(() => {
        waliMenu.style.display = "none";
      }).finally(markRoleAccessReady);
    }
    waliMenu.style.display = "none";
    if (role === "guru") {
      const kodeGuru = String(getCurrentAppUser().kode_guru || "").trim();
      if (!kodeGuru) {
        markRoleAccessReady();
        return Promise.resolve();
      }
      return Promise.all([
        getDashboardCollectionQuery("kelas").where("kode_guru", "==", kodeGuru).limit(1).get(),
        refreshCoordinatorLevels(),
        typeof window.loadGuruNilaiInputAccessSetting === "function"
          ? window.loadGuruNilaiInputAccessSetting(true)
          : Promise.resolve(typeof window.isGuruPtsInputActive === "function" ? window.isGuruPtsInputActive() : true)
      ])
        .then(([snapshot, coordinatorLevels]) => {
          const hasCoordinatorAccess = Array.isArray(coordinatorLevels) && coordinatorLevels.length > 0;
          waliMenu.style.display = snapshot.empty && !hasCoordinatorAccess ? "none" : "";
          if (nilaiMenu) nilaiMenu.style.display = "";
          if (nilaiGuruInputBtn) nilaiGuruInputBtn.style.display = "";
          if (siswaKoordinatorMenu) siswaKoordinatorMenu.style.display = hasCoordinatorAccess ? "" : "none";
          if (kurikulumKoordinatorMenu) kurikulumKoordinatorMenu.style.display = hasCoordinatorAccess ? "" : "none";
        })
        .catch(() => {
          waliMenu.style.display = "none";
          if (nilaiMenu) nilaiMenu.style.display = "";
          if (nilaiGuruInputBtn) nilaiGuruInputBtn.style.display = "";
          if (siswaKoordinatorMenu) siswaKoordinatorMenu.style.display = "none";
          if (kurikulumKoordinatorMenu) kurikulumKoordinatorMenu.style.display = "none";
        })
        .finally(markRoleAccessReady);
    }
    if (siswaKoordinatorMenu) siswaKoordinatorMenu.style.display = "none";
    if (kurikulumKoordinatorMenu) kurikulumKoordinatorMenu.style.display = "none";
    markRoleAccessReady();
    return Promise.resolve();
  }

  function initDashboardPullToRefresh() {
    const content = document.getElementById("content");
    if (!content || content.dataset.pullRefreshReady === "true") return;
    content.dataset.pullRefreshReady = "true";
    let startY = 0;
    let pulling = false;
    content.addEventListener("touchstart", event => {
      if (window.scrollY > 2 || !document.getElementById("homeUpdatedAt")) return;
      startY = event.touches?.[0]?.clientY || 0;
      pulling = Boolean(startY);
    }, { passive: true });
    content.addEventListener("touchmove", event => {
      if (!pulling) return;
      const currentY = event.touches?.[0]?.clientY || 0;
      const distance = currentY - startY;
      document.body.classList.toggle("home-pull-ready", distance > 76);
    }, { passive: true });
    content.addEventListener("touchend", event => {
      if (!pulling) return;
      const endY = event.changedTouches?.[0]?.clientY || 0;
      const distance = endY - startY;
      pulling = false;
      document.body.classList.remove("home-pull-ready");
      if (distance > 76 && document.getElementById("homeUpdatedAt")) {
        window.DashboardHome?.refreshHome?.();
      }
    }, { passive: true });
  }

  async function prepareGuruOfflineData() {
    if (!isGuruSpenturiNativeApp()) {
      Swal.fire("Khusus APK", "Fitur offline disiapkan untuk aplikasi Android Guru Spenturi.", "info");
      return;
    }
    if (!window.GuruOffline?.prepareReadCache) {
      Swal.fire("Belum siap", "Fitur offline belum siap dimuat.", "warning");
      return;
    }
    if (navigator.onLine === false) {
      Swal.fire("Masih offline", "Hubungkan internet dulu untuk menyiapkan cache data awal.", "warning");
      return;
    }
    try {
      Swal.fire({
        title: "Menyiapkan data offline...",
        html: "Memulai cache data...",
        didOpen: () => Swal.showLoading(),
        allowOutsideClick: false
      });
      const total = await window.GuruOffline.prepareReadCache([
        "settings",
        "guru",
        "siswa",
        "kelas",
        "mapel",
        "mengajar",
        "mapel_bayangan",
        "mengajar_bayangan",
        "nilai",
        "informasi_urusan",
        "guru_tugas_tambahan"
      ], {
        onProgress: progress => {
          Swal.update({
            html: `Menyimpan <b>${progress.collectionName}</b> (${progress.index}/${progress.total})...`
          });
        }
      });
      Swal.fire("Data offline siap", `${total} kelompok data berhasil disimpan di perangkat ini.`, "success");
    } catch (error) {
      console.error(error);
      Swal.fire("Gagal menyiapkan data", error?.message || "Pastikan internet aktif lalu coba lagi.", "error");
    }
  }

  if (window.DashboardRoutes?.register) {
    window.DashboardRoutes.register(window.AppRouter);
  }

  window.addEventListener("resize", syncResponsiveSidebar);
  patchGuruZeroResultAlerts();
  applyNativeOnlyUi();
  initGuruSpenturiNativeBackButton();
  syncResponsiveSidebar();
  initDashboardPullToRefresh();
  enforceDashboardMaintenanceMode().then(isBlocked => {
    if (isBlocked) return;
    initializeMaintenanceToggle();
  });
  if (window.DashboardShell?.bootstrap) {
    window.DashboardShell.bootstrap({
      getRole: getCurrentAppRole,
      refreshCoordinatorLevels,
      applyRoleAccess,
      updateSidebarSemesterInfo,
      ensureActiveSemesterDataAvailable: typeof ensureActiveSemesterDataAvailable === "function"
        ? ensureActiveSemesterDataAvailable
        : null,
      renderHome,
      onError: error => console.error(error)
    });
  } else {
    const finalizeDashboardBootstrap = () => {
      applyRoleAccess();
      updateSidebarSemesterInfo();
      if (typeof ensureActiveSemesterDataAvailable === "function") {
        ensureActiveSemesterDataAvailable()
          .catch(error => console.error(error))
          .finally(() => renderHome());
      } else {
        renderHome();
      }
    };

    if (["koordinator", "guru"].includes(getCurrentAppRole())) {
      refreshCoordinatorLevels().finally(finalizeDashboardBootstrap);
    } else {
      finalizeDashboardBootstrap();
    }
  }
</script>

</body>
</html>
